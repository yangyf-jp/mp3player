name: mp3_player
description: A beautiful MP3 player for Windows with playlist management and playback strategies.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # UI Components
  cupertino_icons: ^1.0.6
  google_fonts: ^6.1.0
  
  # State Management
  provider: ^6.1.1
  
  # Database
  sqflite_common_ffi: ^2.3.0+4
  path: ^1.8.3
  path_provider: ^2.1.1
  
  # Audio Playback
  just_audio: ^0.9.36
  just_audio_windows: ^0.2.2
  audio_session: ^0.1.18
  
  # File Handling
  file_picker: ^6.1.1
  
  # UUID for unique IDs
  uuid: ^4.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
